name: Mirror to vivaceailab

on:
  push:
    branches:
      - main
      - claude/charming-ride-nbvjrz

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃 (전체 히스토리 포함)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 커밋 히스토리를 가져옴 (미러링에 필수)

      - name: vivaceailab에 미러링
        run: |
          git remote add vivaceailab https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/kimyh1207/vivaceailab.git
          git push vivaceailab HEAD:main --force
