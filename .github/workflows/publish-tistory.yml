# Tistory 자동 포스팅 워크플로
# status: published 인 파일이 변경될 때 Tistory API로 발행
# 사용 전: TISTORY_ACCESS_TOKEN, TISTORY_BLOG_NAME 시크릿 설정 필요

name: Publish to Tistory

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Publish to Tistory
        env:
          TISTORY_ACCESS_TOKEN: ${{ secrets.TISTORY_ACCESS_TOKEN }}
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
        run: python scripts/publish_tistory.py
